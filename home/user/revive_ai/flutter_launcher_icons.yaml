flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  # Proper dedicated foreground with safe-zone padding for adaptive icons (prevents clipping on all launchers)
  # Background is solid brand blue for maximum quality and consistency
  remove_alpha_ios: true
  # Legacy mipmaps are pre-generated at high quality in the repo (see assets + manual script) for best control
